<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorials Library - Jeen</title>
  <link rel="icon" type="image/png" href="/assets/jeen-symbol.png" />
  <link rel="apple-touch-icon" href="/assets/jeen-symbol.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="navbar-wrap">
      <header class="navbar">
        <a class="brand" href="/" aria-label="Jeen home">
          <img src="/assets/jeen-logo.png" alt="Jeen" />
        </a>
        <nav class="nav-links">
          <a class="nav-item active" href="/">Tutorials Library</a>
          <a class="nav-item" href="/generate">Generate Tutorials</a>
        </nav>
        <div class="navbar-right">
          <span class="avatar">LA</span>
        </div>
      </header>
    </div>

    <main class="main">
      <div class="content">
        <header class="topbar library-topbar">
          <div class="page-title">
            <h1>Tutorials Library</h1>
            <p>Manage and access all generated tutorials and presentations.</p>
          </div>
          <div class="top-actions">
            <div class="export-group">
              <button id="exportExcelBtn" class="btn btn-primary" type="button" disabled>
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Export to Excel
              </button>
              <button id="openSharepointModalBtn" class="btn btn-icon" type="button" aria-label="Save to SharePoint" title="Save to SharePoint">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 21v-8H7v8M7 3v5h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </header>

        <div class="filters-row" style="gap: 12px; margin-bottom: 22px">
          <select id="languageFilter" class="select" style="width: 160px; flex-shrink: 0" aria-label="Filter by language">
            <option value="all">All languages</option>
            <option value="he">Hebrew</option>
            <option value="en">English</option>
          </select>
          <label class="search" style="flex: 1">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="searchInput" class="input" type="search" placeholder="Search tutorials..." />
          </label>
        </div>

        <section class="section panel" style="margin-top: 0">
          <div class="panel-head">
            <div>
              <h2>All Tutorials</h2>
              <p id="resultsSummary">Loading tutorials...</p>
            </div>
          </div>
          <div id="libraryFolders" class="folder-list"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="sharepointModal" class="modal-backdrop" onclick="closeSharepointModal(event)">
    <div class="modal sp-modal" role="dialog" aria-modal="true" aria-labelledby="spModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="spModalTitle">Save to SharePoint</h2>
          <p>Select language and content type to export.</p>
        </div>
        <button class="icon-btn" onclick="closeSharepointModal()" aria-label="Close">x</button>
      </div>
      <div class="sp-modal-body">
        <fieldset class="sp-field">
          <legend>Language</legend>
          <div class="sp-checkbox-group">
            <label class="sp-checkbox">
              <input type="checkbox" name="spLang" value="he" />
              <span>Hebrew</span>
            </label>
            <label class="sp-checkbox">
              <input type="checkbox" name="spLang" value="en" />
              <span>English</span>
            </label>
          </div>
        </fieldset>
        <fieldset class="sp-field">
          <legend>Type</legend>
          <div class="sp-checkbox-group">
            <label class="sp-checkbox">
              <input type="checkbox" name="spType" value="pdf" />
              <span>Presentations</span>
            </label>
            <label class="sp-checkbox">
              <input type="checkbox" name="spType" value="video" />
              <span>Videos</span>
            </label>
          </div>
        </fieldset>
        <button id="spSaveBtn" class="btn btn-primary sp-save-btn" type="button" disabled>
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Save to SharePoint
        </button>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal-backdrop" onclick="closeHistory(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
      <div class="modal-head">
        <div>
          <h2 id="historyTitle">Generation History</h2>
          <p id="historySubtitle" class="page-title"></p>
        </div>
        <button class="icon-btn" onclick="closeHistory()" aria-label="Close history">x</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="/app.js"></script>
  <script src="/library.js"></script>
</body>
</html>
